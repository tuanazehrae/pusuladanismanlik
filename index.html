<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pusula Psikolojik Danışmanlık</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .responsive-iframe-container {
            position: relative;
            overflow: hidden;
            width: 100%;
            height: 700px;
            border-radius: 12px;
        }
        .responsive-iframe-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <!-- Navigasyon Barı -->
    <nav class="navbar navbar-expand-lg navbar-light bg-light shadow-sm sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#">🧭 Pusula Danışmanlık</a>
            <button class="navbar-brand btn btn-outline-primary btn-sm ms-auto me-2" id="loginBtn" onclick="panelModaliAc()">Danışan Girişi & Seans Geçmişi</button>
        </div>
    </nav>

    <!-- Üst Karşılama Alanı -->
    <header class="bg-primary text-white text-center py-5">
        <div class="container">
            <h1 class="display-4 fw-bold">Ruh Sağlığınız İçin Rehber</h1>
            <p class="lead mb-0">Aşağıdaki canlı takvimden boş bir saate tıklayarak randevunuzu anında oluşturabilirsiniz.</p>
        </div>
    </header>

    <!-- Google Canlı Rezervasyon Sistemi Bölümü -->
    <section class="py-5 bg-light" id="randevu-alani">
        <div class="container" style="max-width: 950px;">
            <h2 class="text-center mb-2 fw-bold text-dark">Online Randevu Takvimi</h2>
            <p class="text-center text-muted mb-5">Müsait saatlerden birine tıklayın, bilgilerinizi girerek saniyeler içinde randevunuzu kesinleştirin.</p>
            
            <div class="card shadow-lg border-0 p-2">
                <div class="responsive-iframe-container">
                    <!-- Google Calendar Appointment Scheduling begin -->
<iframe src="https://calendar.google.com/calendar/appointments/schedules/AcZssZ1DTEaXlaM2ggMGa3GsR-RJ-cb88i3s3g5VQdPf6InKauvaiCVlv4AyXYYp3fLnhT6s1Iu36ATl?gv=true" style="border: 0" width="100%" height="600" frameborder="0"></iframe>
<!-- end Google Calendar Appointment Scheduling -->
                </div>
            </div>
        </div>
    </section>

    <!-- Danışan Giriş ve Seans Takip Modali -->
    <div class="modal fade" id="loginModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow">
                <div class="modal-header bg-primary text-white">
                    <h5 class="modal-title fw-bold">Danışan Giriş & Seans Geçmişi</h5>
                    <button type="button" class="btn-close btn-close-white" onclick="panelModaliKapat()"></button>
                </div>
                <div class="modal-body p-4" id="modalBody">
                    <!-- Dinamik İçerik JavaScript ile Gelecek -->
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap ve JavaScript Bağlantıları -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
